
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>✨ Animated Love Letter | I Love You ✨</title>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #ff9a9e 0%, #fad0c4 50%, #fad0c4 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', 'Pacifico', cursive, sans-serif;
      overflow-x: hidden;
      position: relative;
      cursor: pointer;
    }

    /* floating hearts background animation */
    .floating-heart {
      position: fixed;
      font-size: 1.6rem;
      opacity: 0.6;
      pointer-events: none;
      z-index: 1;
      animation: floatUpLove 8s linear infinite;
      bottom: -50px;
    }

    @keyframes floatUpLove {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.8;
      }
      100% {
        transform: translateY(-100vh) rotate(360deg);
        opacity: 0;
      }
    }

    /* Main card container */
    .love-container {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px);
      border-radius: 72px;
      padding: 2rem 2.5rem;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.2), inset 0 1px 2px rgba(255,255,255,0.6);
      text-align: center;
      border: 1px solid rgba(255,255,240,0.5);
      transition: all 0.3s ease;
      margin: 20px;
    }

    .glow-text {
      font-size: 4.5rem;
      font-weight: bold;
      background: linear-gradient(135deg, #fff5e6, #ff3b6f, #ff8e53);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: gradientShift 4s ease infinite, textPop 1.2s infinite alternate;
      letter-spacing: 4px;
      text-shadow: 0 0 15px rgba(255,80,120,0.5);
      margin-bottom: 20px;
      word-break: keep-all;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes textPop {
      0% { transform: scale(1); text-shadow: 0 0 5px rgba(255,80,120,0.3);}
      100% { transform: scale(1.05); text-shadow: 0 0 25px #ff4d6d, 0 0 8px gold;}
    }

    .sub-message {
      font-size: 1.8rem;
      color: #fff2e6;
      background: rgba(0,0,0,0.2);
      display: inline-block;
      padding: 0.4rem 1.5rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      font-weight: 500;
      margin-top: 10px;
      animation: fadeInOut 3s infinite;
    }

    @keyframes fadeInOut {
      0% { opacity: 0.6; transform: translateY(5px);}
      50% { opacity: 1; transform: translateY(0px); letter-spacing: 2px;}
      100% { opacity: 0.6; transform: translateY(5px);}
    }

    /* heart pulse + ring */
    .heartbeat-icon {
      font-size: 5rem;
      color: #ff3366;
      filter: drop-shadow(0 0 12px #ff99aa);
      animation: heartbeat 1.2s infinite, rotateGlow 3s infinite alternate;
      margin: 20px 0;
    }

    @keyframes heartbeat {
      0% { transform: scale(1); }
      25% { transform: scale(1.2); text-shadow: 0 0 20px red; }
      35% { transform: scale(1.1); }
      45% { transform: scale(1.25); }
      55% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    @keyframes rotateGlow {
      0% { filter: drop-shadow(0 0 5px #ff99aa) drop-shadow(0 0 2px gold);}
      100% { filter: drop-shadow(0 0 25px #ff3366) drop-shadow(0 0 8px yellow);}
    }

    /* interactive button style */
    .love-btn {
      background: linear-gradient(45deg, #ff416c, #ff4b2b);
      border: none;
      padding: 14px 32px;
      font-size: 1.3rem;
      font-weight: bold;
      color: white;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      margin: 20px 15px 10px 15px;
      letter-spacing: 2px;
    }

    .love-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 22px #ff4d6d;
      background: linear-gradient(45deg, #ff4b2b, #ff416c);
    }

    .love-btn:active {
      transform: scale(0.96);
    }

    .firebase-counter {
      background: rgba(0,0,0,0.5);
      border-radius: 60px;
      padding: 12px 24px;
      margin-top: 20px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 1.2rem;
      backdrop-filter: blur(8px);
      color: #fff7f0;
      font-weight: bold;
    }

    .counter-number {
      font-size: 2rem;
      background: gold;
      color: #b22234;
      padding: 0 12px;
      border-radius: 60px;
      min-width: 70px;
      display: inline-block;
      font-family: monospace;
      font-weight: 900;
      transition: 0.2s;
    }

    .name-badge {
      font-size: 0.9rem;
      background: rgba(0,0,0,0.4);
      border-radius: 40px;
      padding: 6px 12px;
      margin-top: 12px;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 20;
    }

    /* responsive */
    @media (max-width: 650px) {
      .glow-text { font-size: 2.8rem; }
      .sub-message { font-size: 1.2rem; }
      .heartbeat-icon { font-size: 3.5rem; }
      .love-btn { padding: 10px 20px; font-size: 1rem; }
    }

    .splash {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div class="love-container" id="loveApp">
  <div class="glow-text" id="animatedLoveText">❤️  Oye Babu ,I LOVE YOU ❤️</div>
  <div class="heartbeat-icon">
    <i class="fas fa-heart"></i>
  </div>
  <div class="sub-message" id="dynamicMessage">✨ every heartbeat whispers your name , Kamal ✨</div>
  
  <div>
    <button class="love-btn" id="sendLoveBtn"><i class="fas fa-heart-broken" style="margin-right: 8px;"></i> Send Love 💖</button>
    <button class="love-btn" id="triggerSparkleBtn"><i class="fas fa-star-of-life"></i> Magic Sparkles ✨</button>
  </div>

  <div class="firebase-counter">
    <i class="fas fa-globe-americas"></i> <span>💞 WorldWide Love Count 💞</span>
    <span class="counter-number" id="loveCounterValue">0</span>
    <i class="fas fa-heart" style="color:#ff8080;"></i>
  </div>
  <div class="name-badge">
    <i class="fas fa-map-marker-alt"></i> <span id="liveIndicator">❤️ Connected to Love Cloud ❤️</span>
  </div>
</div>

<!-- canvas for particle effects -->
<canvas id="sparkleCanvas"></canvas>

<script>
  // ---------- 1. Firebase Configuration (Demo realtime database) ----------
  // For demonstration, using a public test Firebase config (love-counter app).
  // This ensures realtime sync across anyone opening the page. 
  // Security: only increments, but it's safe for demo.
//   const firebaseConfig = {
//     apiKey: "AIzaSyB_73E2JM6JxM5I7rLrZz4QqQyJ3BvUw7c",       // demo key (public test project)
//     authDomain: "love-counter-demo-123.firebaseapp.com",
//     databaseURL: "https://love-counter-demo-123-default-rtdb.firebaseio.com",
//     projectId: "love-counter-demo-123",
//     storageBucket: "love-counter-demo-123.appspot.com",
//     messagingSenderId: "123456789012",
//     appId: "1:123456789012:web:abc123def456"
//   };
  

  const firebaseConfig = {
  apiKey: "AIzaSyAlxLrrMnwIBvxdQcqQWcgVoUvuM-h9n2g",
  authDomain: "kanban-3e0d5.firebaseapp.com",
  projectId: "kanban-3e0d5",
  storageBucket: "kanban-3e0d5.appspot.com",
  messagingSenderId: "974336051979",
  appId: "1:974336051979:web:eca4e19e609e5c04cf700e",
  measurementId: "G-2F8JWWMNDQ"
};

  // Initialize Firebase (if not already)
  let app, database, loveRef;
  let isFirebaseReady = false;
  try {
    if (!firebase.apps.length) {
      app = firebase.initializeApp(firebaseConfig);
    } else {
      app = firebase.app();
    }
    database = firebase.database(app);
    loveRef = database.ref('/loveCounter');
    isFirebaseReady = true;
    console.log("🔥 Firebase connected");
  } catch(e) {
    console.warn("Firebase init error, using local fallback", e);
    isFirebaseReady = false;
  }

  // Local counter fallback
  let localLoveCount = 0;
  let currentGlobalCount = 0;

  // DOM elements
  const loveCounterSpan = document.getElementById('loveCounterValue');
  const sendLoveBtn = document.getElementById('sendLoveBtn');
  const triggerSparkleBtn = document.getElementById('triggerSparkleBtn');
  const animatedTextDiv = document.getElementById('animatedLoveText');
  const dynamicMsgSpan = document.getElementById('dynamicMessage');

  // ---------- 2. Sparkle Canvas Particle System ----------
  const canvas = document.getElementById('sparkleCanvas');
  let ctx = canvas.getContext('2d');
  let particles = [];
  let animationId = null;
  let canvasWidth = window.innerWidth;
  let canvasHeight = window.innerHeight;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    canvasWidth = canvas.width;
    canvasHeight = canvas.height;
  }
  window.addEventListener('resize', () => {
    resizeCanvas();
  });
  resizeCanvas();

  class SparkleParticle {
    constructor(x, y, vx, vy, size, color, life) {
      this.x = x;
      this.y = y;
      this.vx = vx;
      this.vy = vy;
      this.size = size;
      this.color = color;
      this.life = life;
      this.maxLife = life;
      this.opacity = 1;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.vy += 0.1; // slight gravity
      this.life -= 1;
      this.opacity = Math.min(1, this.life / this.maxLife);
      return this.life > 0;
    }
    draw(ctx) {
      ctx.save();
      ctx.globalAlpha = this.opacity * 0.9;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.fill();
      // additional glow effect
      ctx.shadowBlur = 8;
      ctx.shadowColor = "#ff66aa";
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.restore();
    }
  }

  function addSparkleExplosion(centerX, centerY, intensity = 30) {
    const colors = ['#ff99cc', '#ff6680', '#ffcc99', '#ffd700', '#ff3399', '#ff6666', '#ffb3ff'];
    for (let i = 0; i < intensity; i++) {
      let angle = Math.random() * Math.PI * 2;
      let speed = Math.random() * 4 + 1;
      let vx = Math.cos(angle) * speed * (Math.random() * 2);
      let vy = Math.sin(angle) * speed * (Math.random() * 2) - 1.5;
      let size = Math.random() * 6 + 2;
      let color = colors[Math.floor(Math.random() * colors.length)];
      let life = 40 + Math.random() * 50;
      let x = centerX + (Math.random() - 0.5) * 35;
      let y = centerY + (Math.random() - 0.5) * 35;
      particles.push(new SparkleParticle(x, y, vx, vy, size, color, life));
    }
  }

  function sparkleFromMouse(event) {
    let x = event.clientX;
    let y = event.clientY;
    if (x && y) addSparkleExplosion(x, y, 25);
  }

  function randomScreenSparkles() {
    for(let i=0;i<18;i++) {
      let x = Math.random() * canvasWidth;
      let y = Math.random() * canvasHeight;
      addSparkleExplosion(x, y, 12);
    }
    // also from center text effect
    const rect = document.querySelector('.love-container').getBoundingClientRect();
    addSparkleExplosion(rect.left + rect.width/2, rect.top + rect.height/2, 35);
  }

  function animateParticles() {
    if (!ctx) return;
    ctx.clearRect(0, 0, canvasWidth, canvasHeight);
    for (let i = particles.length-1; i >= 0; i--) {
      let alive = particles[i].update();
      if (alive) {
        particles[i].draw(ctx);
      } else {
        particles.splice(i,1);
      }
    }
    if (particles.length > 0) {
      animationId = requestAnimationFrame(animateParticles);
    } else {
      if (animationId) cancelAnimationFrame(animationId);
      animationId = null;
    }
  }

  function triggerSparklesOnElement(el, count=20) {
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    addSparkleExplosion(cx, cy, count);
    if (!animationId && particles.length) animateParticles();
  }

  // 3. Floating background hearts generator (continuous)
  function createFloatingHeart() {
    const heartDiv = document.createElement('div');
    heartDiv.classList.add('floating-heart');
    heartDiv.innerHTML = ['❤️','💖','💗','💓','💕','❣️','💘','💝'][Math.floor(Math.random()*8)];
    heartDiv.style.left = Math.random() * 100 + '%';
    heartDiv.style.fontSize = (Math.random() * 25 + 15) + 'px';
    heartDiv.style.animationDuration = (Math.random() * 5 + 5) + 's';
    heartDiv.style.opacity = Math.random() * 0.6 + 0.2;
    document.body.appendChild(heartDiv);
    setTimeout(() => { if(heartDiv && heartDiv.remove) heartDiv.remove(); }, 8000);
  }
  setInterval(createFloatingHeart, 400);

  // 4. Firebase counter sync and increment
  function updateCounterUI(value) {
    if (loveCounterSpan) {
      loveCounterSpan.innerText = value;
      // slight pop animation
      loveCounterSpan.style.transform = 'scale(1.2)';
      setTimeout(() => { if(loveCounterSpan) loveCounterSpan.style.transform = 'scale(1)'; }, 180);
    }
    currentGlobalCount = value;
  }

  // send love: increment the global counter (atomic)
  function sendLoveIncrement() {
    // visual & haptic like effect
    triggerSparklesOnElement(sendLoveBtn, 18);
    // Add heart beat effect on container
    const heartIcon = document.querySelector('.heartbeat-icon');
    heartIcon.style.animation = 'none';
    heartIcon.offsetHeight;
    heartIcon.style.animation = 'heartbeat 1.2s infinite, rotateGlow 3s infinite alternate';
    
    // change love message temporarily
    const originalText = animatedTextDiv.innerText;
    animatedTextDiv.style.transform = 'scale(1.1)';
    animatedTextDiv.innerText = '💕 YOU SENT LOVE! 💕';
    setTimeout(() => {
      animatedTextDiv.innerText = originalText;
      animatedTextDiv.style.transform = 'scale(1)';
    }, 500);
    
    dynamicMsgSpan.innerHTML = '✨ Love shared! The world glows brighter ✨';
    setTimeout(() => {
      dynamicMsgSpan.innerHTML = '✨ every heartbeat whispers your name ✨';
    }, 1800);
    
    if (isFirebaseReady && loveRef) {
      loveRef.transaction((currentVal) => {
        return (currentVal || 0) + 1;
      }, (error, committed, snapshot) => {
        if (error) {
          console.warn("transaction error, fallback", error);
          localLoveCount++;
          updateCounterUI(localLoveCount);
        } else if (committed) {
          // success
          if (snapshot) updateCounterUI(snapshot.val());
        }
      });
    } else {
      localLoveCount++;
      updateCounterUI(localLoveCount);
    }
    // play a little sound-like visual: extra hearts burst
    for(let i=0;i<8;i++) setTimeout(()=> createFloatingHeart(), i*80);
  }

  // Listen to realtime updates from Firebase
  function listenLoveCount() {
    if (isFirebaseReady && loveRef) {
      loveRef.on('value', (snapshot) => {
        const val = snapshot.val();
        if (val !== null && typeof val === 'number') {
          updateCounterUI(val);
          localLoveCount = val;
        } else if (val === null) {
          loveRef.set(0);
          updateCounterUI(0);
          localLoveCount = 0;
        } else if (typeof val !== 'number') {
          loveRef.set(0);
          updateCounterUI(0);
        }
      });
    } else {
      // Fallback mode: local storage?
      let stored = localStorage.getItem('loveLocalCount');
      if (stored) localLoveCount = parseInt(stored) || 0;
      updateCounterUI(localLoveCount);
      setInterval(() => {
        if(!isFirebaseReady) {
          localStorage.setItem('loveLocalCount', localLoveCount);
        }
      }, 1000);
    }
  }

  // magic random phrase animation
  const loveQuotes = [
    "💞 You make my world complete 💞", "✨ Yours forever & always ✨", "🌹 Infinity times yes 🌹",
    "💘 Every star whispers your name 💘", "🌟 My heart beats only for you 🌟", "💖 More than words can say 💖",
    "🌸 You are my sunshine 🌸", "💫 Endless love for you 💫"
  ];
  let quoteInterval;
  function startQuoteRotation() {
    quoteInterval = setInterval(() => {
      const randomIdx = Math.floor(Math.random() * loveQuotes.length);
      dynamicMsgSpan.style.opacity = '0';
      setTimeout(() => {
        dynamicMsgSpan.innerHTML = loveQuotes[randomIdx];
        dynamicMsgSpan.style.opacity = '1';
      }, 200);
    }, 4000);
  }
  
  // additional click anywhere love effect
  document.body.addEventListener('click', (e) => {
    // prevent double fire on buttons
    if(e.target === sendLoveBtn || e.target === triggerSparkleBtn) return;
    addSparkleExplosion(e.clientX, e.clientY, 12);
    if (!animationId && particles.length) animateParticles();
    // mini floating word
    const loveWord = document.createElement('div');
    loveWord.innerText = ['❤️', '💖', '✨ love ✨'][Math.floor(Math.random()*3)];
    loveWord.style.position = 'fixed';
    loveWord.style.left = e.clientX + 'px';
    loveWord.style.top = e.clientY + 'px';
    loveWord.style.fontSize = '1.8rem';
    loveWord.style.pointerEvents = 'none';
    loveWord.style.zIndex = '999';
    loveWord.style.animation = 'floatUpLove 1.2s forwards';
    loveWord.style.opacity = '0.9';
    document.body.appendChild(loveWord);
    setTimeout(() => loveWord.remove(), 1200);
  });

  // 5. Trigger Magic Sparkles Button Effect
  function bigMagicSparkle() {
    randomScreenSparkles();
    triggerSparklesOnElement(animatedTextDiv, 45);
    for(let i=0;i<6;i++) createFloatingHeart();
    dynamicMsgSpan.innerHTML = '💫 MAGIC SPARKLES OF LOVE 💫';
    setTimeout(() => {
      dynamicMsgSpan.innerHTML = loveQuotes[Math.floor(Math.random()*loveQuotes.length)];
    }, 1300);
    // also add rainbow pulse to container
    const container = document.querySelector('.love-container');
    container.style.transform = 'scale(1.01)';
    container.style.boxShadow = '0 0 30px #ff99cc';
    setTimeout(() => {
      container.style.transform = 'scale(1)';
      container.style.boxShadow = '0 30px 50px rgba(0, 0, 0, 0.2)';
    }, 300);
    if (!animationId && particles.length) animateParticles();
  }
  
  // Mouse move tiny sparkle trail (optional romance)
  let lastTime = 0;
  document.addEventListener('mousemove', (e) => {
    const now = Date.now();
    if(now - lastTime > 90) {
      lastTime = now;
      addSparkleExplosion(e.clientX, e.clientY, 3);
      if(!animationId && particles.length) animateParticles();
    }
  });
  
  // Initialize All Animations
  function init() {
    resizeCanvas();
    listenLoveCount();
    startQuoteRotation();
    // initial sparkles on load
    setTimeout(() => {
      randomScreenSparkles();
      triggerSparklesOnElement(animatedTextDiv, 35);
      if(!animationId && particles.length) animateParticles();
    }, 400);
    // Interactive events
    sendLoveBtn.addEventListener('click', sendLoveIncrement);
    triggerSparkleBtn.addEventListener('click', bigMagicSparkle);
    // Add hover effect on text
    animatedTextDiv.addEventListener('mouseenter', () => {
      triggerSparklesOnElement(animatedTextDiv, 10);
    });
  }

  // sweet interval for extra love bg hearts animation
  setInterval(() => {
    if(Math.random()>0.65) createFloatingHeart();
  }, 800);
  
  init();
</script>
</body>
</html>
